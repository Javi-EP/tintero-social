spring:
  datasource:
    url: jdbc:h2:mem:db_users
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

# Configuración JWT
jwt:
  secret: tintero-social-secret-key-muy-larga-para-que-sea-segura-2026
  expiration: 86400000  # 24 horas en milisegundos