spring:
  datasource:
    url: jdbc:mysql://localhost:3306/db_books?useSSL=false&serverTimezone=America/Santiago
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password:   # vacío por defecto en XAMPP

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect
    properties:
      hibernate:
        format_sql: true