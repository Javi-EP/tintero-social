spring:
  datasource:
    url: jdbc:h2:mem:db_reading_lists
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

# URLs de los otros microservicios
services:
  book-service:
    url: http://localhost:8082
  user-service:
    url: http://localhost:8081